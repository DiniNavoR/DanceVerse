        <p>Have questions? Want to join our dance community? Let’s talk!</p>

            <form>
                <div class="form-group">
                    <label>Name</label>

                </div>

                <div class="form-group">
                    <label>Message</label>

                </div>

                <button type="submit">Send Message</button>
            </form>
