<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dance Gallery</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="files/logo.png" rel="icon">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div style="display: flex;">
            <a href="index.html">
            <img src="files/logo.png" width="100px" height="100px">
            </a>
            <a href="index.html">
            <h1 style="padding-top: 30px;">DanceVerse</h1>
            </a>
        </div>

        <div style="padding-top: 29px;">
            <a href="index.html">Home</a>
            <a href="styles.html">Styles</a>
            <a href="learning.html">Learning Hub</a>
            <a href="all-users.html">Dancers</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <!-- Header -->
    <div class="header">
        <h1>Dance Gallery</h1>
        <p>Moments that move the soul</p>
    </div>

    <!-- Filters -->
    <div class="filters">
        <button class="active" onclick="filterGallery('all')">All</button>
        <button onclick="filterGallery('hiphop')">Hip Hop</button>
        <button onclick="filterGallery('ballet')">Ballet</button>
        <button onclick="filterGallery('salsa')">Salsa</button>
        <button onclick="filterGallery('bharatham')">Bharatham</button>
        <button onclick="filterGallery('traditional')">Traditional</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">
        <div class="item hiphop">
            <img src="https://images.unsplash.com/photo-1535525153412-5a42439a210d" onclick="openLightbox(this)" alt="Hip Hop Dance">
            <div class="overlay" style="flex-direction: column;">
                <h3>Hip Hop</h3>
                <p style="color: #fff; font-size: 12px; margin-top: 10px; font-weight: bold;">@Dinithi</p>
            </div>
        </div>

        <div class="item ballet">
            <img src="https://images.unsplash.com/photo-1510414842594-a61c69b5ae57" onclick="openLightbox(this)" alt="Ballet Dance">
            <div class="overlay" style="flex-direction: column;">
                <h3>Ballet</h3>
                <p style="color: #fff; font-size: 12px; margin-top: 10px; font-weight: bold;">@testdancer</p>
            </div>
        </div>

        <div class="item salsa">
            <img src="https://images.unsplash.com/photo-1601655781320-205e34c94eb1" onclick="openLightbox(this)" alt="Salsa Dance">
            <div class="overlay" style="flex-direction: column;">
                <h3>Salsa</h3>
                <p style="color: #fff; font-size: 12px; margin-top: 10px; font-weight: bold;">@gh</p>
            </div>
        </div>

        <div class="item bharatham">
            <img src="https://images.unsplash.com/photo-1582736140523-7e44a04fc9c7" onclick="openLightbox(this)" alt="Bharatham Dance">
            <div class="overlay" style="flex-direction: column;">
                <h3>Bharatham</h3>
                <p style="color: #fff; font-size: 12px; margin-top: 10px; font-weight: bold;">@hj</p>
            </div>
        </div>

        <div class="item traditional">
            <img src="https://images.unsplash.com/photo-1598971861713-54ad16a7e72e" onclick="openLightbox(this)" alt="Traditional Dance">
            <div class="overlay" style="flex-direction: column;">
                <h3>Traditional</h3>
                <p style="color: #fff; font-size: 12px; margin-top: 10px; font-weight: bold;">@hj</p>
            </div>
        </div>

        <div class="item hiphop">
            <img src="https://images.unsplash.com/photo-1520975922284-1b4a6943f52b" onclick="openLightbox(this)" alt="Hip Hop Dance 2">
            <div class="overlay" style="flex-direction: column;">
                <h3>Hip Hop</h3>
                <p style="color: #fff; font-size: 12px; margin-top: 10px; font-weight: bold;">@gh</p>
            </div>
        </div>

        <div class="item traditional">
            <img src="https://images.unsplash.com/photo-1598971861713-54ad16a7e72e" onclick="openLightbox(this)" alt="Traditional Dance">
            <div class="overlay" style="flex-direction: column;">
                <h3>Traditional</h3>
                <p style="color: #fff; font-size: 12px; margin-top: 10px; font-weight: bold;">@Dinithi</p>
            </div>
        </div>

        <div class="item ballet">
            <img src="https://images.unsplash.com/photo-1549899598-1b2a3f7a59ab" onclick="openLightbox(this)" alt="Ballet Dance 2">
            <div class="overlay" style="flex-direction: column;">
                <h3>Ballet</h3>
                <p style="color: #fff; font-size: 12px; margin-top: 10px; font-weight: bold;">@Dini</p>
            </div>
        </div>  
        
        <button class="item" style="background: #111; color: #a855f7; border: 2px dashed #a855f7; border-radius: 15px; cursor: pointer; transition: 0.3s;" onclick="alert('Upload functionality coming soon!')">Add Images + </button>

    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination">
        <!-- Pagination buttons will be injected here -->
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span onclick="closeLightbox()">×</span>
        <img id="lightboxImg">
    </div>

    <!-- Footer -->
    <footer>
        © 2026 DanceVerse | Feel the Beat
    </footer>

    <script src="script.js"></script>

</body>
</html>
