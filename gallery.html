<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dance Gallery</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="files/logo.png" rel="icon">
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- Navigation -->
    <nav>
        <div style="display: flex;">
            <a href="index.html">
            <img src="files/logo.png" width="100px" height="100px">
            </a>
            <a href="index.html">
            <h1 style="padding-top: 30px;">DanceVerse</h1>
            </a>
        </div>

        <div style="padding-top: 29px;">
            <a href="index.html">Home</a>
            <a href="styles.html">Styles</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <!-- Header -->
    <div class="header">
        <h1>Dance Gallery</h1>
        <p>Moments that move the soul</p>
    </div>

    <!-- Filters -->
    <div class="filters">
        <button class="active" onclick="filterGallery('all')">All</button>
        <button onclick="filterGallery('hiphop')">Hip Hop</button>
        <button onclick="filterGallery('ballet')">Ballet</button>
        <button onclick="filterGallery('salsa')">Salsa</button>
        <button onclick="filterGallery('bharatham')">Bharatham</button>
        <button onclick="filterGallery('traditional')">Traditional</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">
        <div class="item hiphop">
            <img src="" onclick="openLightbox(this)">
            <div class="overlay"><h3>Hip Hop</h3></div>
        </div>

        <div class="item ballet">
            <img src="" onclick="openLightbox(this)">
            <div class="overlay"><h3>Ballet</h3></div>
        </div>

        <div class="item latin">
            <img src="https://images.unsplash.com/photo-1601655781320-205e34c94eb1" onclick="openLightbox(this)">
            <div class="overlay"><h3>Latin</h3></div>
        </div>

        <div class="item traditional">
            <img src="https://images.unsplash.com/photo-1598971861713-54ad16a7e72e" onclick="openLightbox(this)">
            <div class="overlay"><h3>Traditional</h3></div>
        </div>

        <div class="item hiphop">
            <img src="https://images.unsplash.com/photo-1520975922284-1b4a6943f52b" onclick="openLightbox(this)">
            <div class="overlay"><h3>Hip Hop</h3></div>
        </div>

        <div class="item ballet">
            <img src="https://images.unsplash.com/photo-1549899598-1b2a3f7a59ab" onclick="openLightbox(this)">
            <div class="overlay"><h3>Ballet</h3></div>
        </div>  
        
        
        <button class="item">Add Images + </button>

    </div>

  

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span onclick="closeLightbox()">×</span>
        <img id="lightboxImg">
    </div>

    <!-- Footer -->
    <footer>
        © 2026 DanceVerse | Feel the Beat
    </footer>

    <script>
        function filterGallery(category) {
            const items = document.querySelectorAll('.item');
            const buttons = document.querySelectorAll('.filters button');

            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function openLightbox(img) {
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('lightboxImg').src = img.src;
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>

</body>
</html>
