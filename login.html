<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dancer Authentication</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="files/logo.png" rel="icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation -->
    <nav>
        <div style="display: flex;">
            <a href="index.html">
                <img src="files/logo.png" width="100px" height="100px">
            </a>
            <a href="index.html">
                <h1 style="padding-top: 30px;">DanceVerse</h1>
            </a>
        </div>

        <div style="padding-top: 29px;">
            <a href="index.html">Home</a>
            <a href="styles.html">Styles</a>
            <a href="learning.html">Learning Hub</a>
            <a href="all-users.html">Dancers</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="auth-page">

        <div class="auth-container" id="loginForm">
            <div class="form-section">
                <h2>Dancer Login</h2>

                <form onsubmit="handleAuth(event, 'login')">
                    <input type="email" id="loginEmail" placeholder="Email Address" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>

                    <div class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>

                    <button type="submit">Login</button>
                </form>

                <p style="margin-top: 15px;">New to DanceVerse? <a href="javascript:void(0)"
                        onclick="toggleAuth('register')">Register here</a></p>
                <p><a href="#">Forgot password?</a></p>

                <div class="or-divider">
                    <span>OR</span>
                </div>

                <div class="social">
                    <button type="button" onclick="handleAuth(event, 'social')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                            alt="Google Logo" class="social-icon">
                        Login with Google
                    </button>
                    <button type="button" onclick="handleAuth(event, 'social')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg"
                            alt="Facebook Logo" class="social-icon">
                        Login with Facebook
                    </button>
                </div>
            </div>
        </div>

        <!-- Register Section -->
        <div class="auth-container" id="registerForm" style="display: none;">
            <div class="form-section">
                <h2>Dancer Register</h2>

                <form onsubmit="handleAuth(event, 'register')">
                    <input type="text" placeholder="Username" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="password" placeholder="Password" required>

                    <select required>
                        <option value="" disabled selected>Primary Dance Style</option>
                        <option value="hiphop">Hip Hop</option>
                        <option value="ballet">Ballet</option>
                        <option value="salsa">Salsa</option>
                        <option value="traditional">Traditional</option>
                        <option value="bharatham">Bharatham</option>
                    </select>

                    <select required>
                        <option value="" disabled selected>Skill Level</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>

                    <button type="submit">Create Account</button>
                </form>

                <p style="margin-top: 15px;">Already have an account? <a href="javascript:void(0)"
                        onclick="toggleAuth('login')">Login here</a></p>

                <div class="or-divider">
                    <span>OR</span>
                </div>

                <div class="social">
                    <button type="button" onclick="handleAuth(event, 'social')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                            alt="Google Logo" class="social-icon">
                        Register with Google
                    </button>
                    <button type="button" onclick="handleAuth(event, 'social')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg"
                            alt="Facebook Logo" class="social-icon">
                        Register with Facebook
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer>
        © 2026 DanceVerse | Feel the Beat
    </footer>

    <script>
        function toggleAuth(view) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (view === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            } else {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            }
        }

        function handleAuth(event, type) {
            event.preventDefault();

            // Simulation: set isLoggedIn flag in localStorage
            localStorage.setItem('isLoggedIn', 'true');

            if (type === 'register') {
                alert('Account created successfully! Welcome to DanceVerse.');
            } else if (type === 'social') {
                alert('Signed in with social account!');
            } else {
                alert('Login successful!');
            }

            // Redirect to index.html
            window.location.href = 'index.html';
        }

        // Check if already logged in
        window.onload = function () {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
