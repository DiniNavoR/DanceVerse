<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DanceVerse - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="files/logo.png" rel="icon">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1535525153412-5a42439a210d?auto=format&fit=crop&q=80') center/cover no-repeat;
            padding: 40px 20px;
        }
        .auth-card {
            background: #1a1a1a;
            padding: 45px 40px;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
            text-align: center;
        }
        .auth-card .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .auth-card .logo-wrap h2 {
            color: #a855f7;
            margin: 0;
            font-size: 28px;
        }
        .auth-card h3 {
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 22px;
        }
        .auth-card .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .auth-card .form-group {
            text-align: left;
            margin-bottom: 18px;
        }
        .auth-card label {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 6px;
            display: block;
        }
        .auth-card input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1.5px solid #333;
            background: #0f0f0f;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .auth-card input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }
        .forgot-link {
            display: block;
            text-align: right;
            color: #c084fc;
            font-size: 13px;
            text-decoration: none;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        .forgot-link:hover { text-decoration: underline; }
        .btn-auth {
            width: 100%;
            padding: 13px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #a855f7, #6b21a8);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
            margin-top: 5px;
        }
        .btn-auth:hover {
            background: linear-gradient(135deg, #c084fc, #7e22ce);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.6);
            transform: scale(1.02);
        }
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 22px 0;
        }
        .divider hr { flex: 1; border-color: #333; }
        .divider span { color: #666; font-size: 13px; }
        .switch-link { color: #ccc; font-size: 14px; margin-top: 20px; }
        .switch-link a { color: #c084fc; text-decoration: none; font-weight: bold; }
        .switch-link a:hover { text-decoration: underline; }
        .alert-msg {
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            text-align: left;
        }
        .alert-error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: #f87171;
        }
        .alert-success {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.4);
            color: #86efac;
        }
    </style>
</head>

<body>
    <nav>
        <div style="display:flex;">
            <a href="index.html"><img src="files/logo.png" width="100px" height="100px"></a>
            <a href="index.html"><h1 style="padding-top:30px;">DanceVerse</h1></a>
        </div>
        <div style="padding-top:29px;">
            <a href="index.html">Home</a>
            <a href="styles.html">Styles</a>
            <a href="learning.html">Learning Hub</a>
            <a href="all-users.html">Dancers</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">

            <div class="logo-wrap">
                <img src="files/logo.png" width="45px" height="45px">
                <h2>DanceVerse</h2>
            </div>

            <h3>Welcome Back!</h3>
            <p class="subtitle">Login to continue your dance journey</p>

            <div class="alert-msg alert-error" id="errorMsg"></div>
            <div class="alert-msg alert-success" id="successMsg"></div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <a href="#" class="forgot-link">Forgot password?</a>

            <button class="btn-auth" id="loginBtn" onclick="handleLogin()">Login</button>

            <div class="divider"><hr><span>OR</span><hr></div>

            <p class="switch-link">
                Don't have an account? <a href="register.html">Register Now</a>
            </p>
        </div>
    </div>

    <footer>© 2026 DanceVerse | Connect with the Rhythm</footer>

    <script>
        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            if (Auth.isLoggedIn()) window.location.href = 'index.html';
        });

        async function handleLogin() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg  = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const btn = document.getElementById('loginBtn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!email || !password) {
                errorMsg.textContent = 'Please fill in all fields.';
                errorMsg.style.display = 'block';
                return;
            }

            // Disable button while waiting
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    // Save login state & user info
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('dv_currentUser', JSON.stringify(result.user));

                    successMsg.textContent = result.message;
                    successMsg.style.display = 'block';

                    setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                } else {
                    errorMsg.textContent = result.message;
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Login';
                }

            } catch (err) {
                errorMsg.textContent = 'Could not connect to server. Make sure XAMPP is running.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
