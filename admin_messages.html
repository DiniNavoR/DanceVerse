<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DanceVerse - Admin: Messages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="files/logo.png" rel="icon">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-wrapper {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px 80px;
        }
        .admin-title {
            color: #a855f7;
            font-size: 36px;
            text-align: center;
            margin-bottom: 8px;
        }
        .admin-sub {
            text-align: center;
            color: #aaa;
            margin-bottom: 40px;
            font-size: 15px;
        }
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 18px 28px;
            flex: 1;
            min-width: 140px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .stat-box .num {
            font-size: 32px;
            font-weight: bold;
            color: #a855f7;
        }
        .stat-box .lbl {
            font-size: 13px;
            color: #aaa;
            margin-top: 4px;
        }
        .msg-card {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 22px 26px;
            margin-bottom: 16px;
            border-left: 4px solid #a855f7;
            transition: 0.3s;
            position: relative;
        }
        .msg-card.unread {
            border-left-color: #f59e0b;
            background: #1e1a0e;
        }
        .msg-card:hover {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }
        .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        .msg-name {
            font-size: 17px;
            font-weight: bold;
            color: #fff;
        }
        .msg-email {
            color: #c084fc;
            font-size: 14px;
        }
        .msg-date {
            font-size: 12px;
            color: #666;
        }
        .msg-body {
            color: #ccc;
            font-size: 15px;
            line-height: 1.6;
            margin-top: 8px;
        }
        .badge-unread {
            background: #f59e0b;
            color: #000;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
        .badge-read {
            background: #333;
            color: #888;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .mark-btn {
            background: none;
            border: 1px solid #a855f7;
            color: #a855f7;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            width: auto;
            transition: 0.3s;
        }
        .mark-btn:hover {
            background: #a855f7;
            color: white;
            box-shadow: none;
        }
        .loading {
            text-align: center;
            color: #aaa;
            padding: 60px 0;
            font-size: 16px;
        }
        .empty {
            text-align: center;
            color: #555;
            padding: 60px 0;
            font-size: 16px;
        }
        .refresh-btn {
            display: inline-block;
            background: linear-gradient(135deg, #a855f7, #6b21a8);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            margin-bottom: 20px;
        }
        .refresh-btn:hover {
            background: linear-gradient(135deg, #c084fc, #7e22ce);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
    </style>
</head>
<body>

    <nav>
        <div style="display:flex;">
            <a href="index.html"><img src="files/logo.png" width="100px" height="100px"></a>
            <a href="index.html"><h1 style="padding-top:30px;">DanceVerse</h1></a>
        </div>
        <div style="padding-top:29px;">
            <a href="index.html">Home</a>
            <a href="styles.html">Styles</a>
            <a href="learning.html">Learning Hub</a>
            <a href="all-users.html">Dancers</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="admin-wrapper">
        <h1 class="admin-title">📬 Contact Messages</h1>
        <p class="admin-sub">All messages submitted through the Contact page</p>

        <div class="stats-bar" id="statsBar"></div>

        <button class="refresh-btn" onclick="loadMessages()">🔄 Refresh</button>

        <div id="messageList"><div class="loading">Loading messages...</div></div>
    </div>

    <footer>© 2026 DanceVerse | Admin Panel</footer>

    <script>
        async function loadMessages() {
            const list = document.getElementById('messageList');
            const stats = document.getElementById('statsBar');
            list.innerHTML = '<div class="loading">Loading messages...</div>';

            try {
                const res = await fetch('api/get_messages.php');
                const data = await res.json();

                if (!data.success) {
                    list.innerHTML = '<div class="empty">Failed to load messages.</div>';
                    return;
                }

                const messages = data.messages;
                const unread = messages.filter(m => m.is_read === '0' || m.is_read === 0).length;

                // Stats bar
                stats.innerHTML = `
                    <div class="stat-box"><div class="num">${data.total}</div><div class="lbl">Total Messages</div></div>
                    <div class="stat-box"><div class="num" style="color:#f59e0b">${unread}</div><div class="lbl">Unread</div></div>
                    <div class="stat-box"><div class="num" style="color:#86efac">${data.total - unread}</div><div class="lbl">Read</div></div>
                `;

                if (messages.length === 0) {
                    list.innerHTML = '<div class="empty">📭 No messages yet.</div>';
                    return;
                }

                list.innerHTML = messages.map(m => `
                    <div class="msg-card ${m.is_read == 0 ? 'unread' : ''}" id="card-${m.id}">
                        <div class="msg-header">
                            <div>
                                <div class="msg-name">${escHtml(m.name)}</div>
                                <div class="msg-email">📧 ${escHtml(m.email)}</div>
                            </div>
                            <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                                <span class="msg-date">🕐 ${formatDate(m.created_at)}</span>
                                ${m.is_read == 0
                                    ? `<span class="badge-unread">NEW</span>
                                       <button class="mark-btn" onclick="markRead(${m.id})">Mark as Read</button>`
                                    : `<span class="badge-read">Read</span>`
                                }
                            </div>
                        </div>
                        <div class="msg-body">${escHtml(m.message)}</div>
                    </div>
                `).join('');

            } catch (err) {
                list.innerHTML = '<div class="empty">⚠️ Could not connect to server. Make sure XAMPP is running.</div>';
            }
        }

        async function markRead(id) {
            try {
                const res = await fetch('api/mark_read.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.success) loadMessages();
            } catch (e) {
                alert('Failed to update message.');
            }
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
                 + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
        }

        // Load on page open
        loadMessages();
    </script>
</body>
</html>
